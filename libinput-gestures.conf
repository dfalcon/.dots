# libinput-gestures для Hyprland
# Після встановлення: libinput-gestures-setup start
# Потім додати до автостарту: exec-once = libinput-gestures-setup start

# 3 пальці горизонтально — воркспейси
gesture swipe left  3 hyprctl dispatch workspace e-1
gesture swipe right 3 hyprctl dispatch workspace e+1

# 3 пальці вертикально
gesture swipe up   3 hyprctl dispatch fullscreen 0
gesture swipe down 3 hyprctl dispatch togglefloating

# 4 пальці
gesture swipe up   4 hyprctl dispatch layoutmsg togglesplit
gesture swipe down 4 hyprctl dispatch layoutmsg togglesplit

# Pinch
gesture pinch in  2 hyprctl dispatch killactive
gesture pinch out 3 hyprctl dispatch reload
