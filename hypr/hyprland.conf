################
### MONITORS ###
################

source = ~/.config/hypr/monitors.conf
# керування через nwg-displays ($mod+X)

###################
### MY PROGRAMS ###
###################

$terminal  = kitty
$menu      = wofi --show drun
# $menu    = rofi -modi window,drun,run -show drun -sidebar-mode -show-icons
$mainMod   = SUPER

#################
### AUTOSTART ###
#################

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/xdg-desktop-portal-hyprland
exec-once = /usr/lib/xdg-desktop-portal --replace
exec-once = nm-applet
exec-once = waybar
exec-once = swaync
exec-once = QT_AUTO_SCREEN_SCALE_FACTOR=0 QT_SCALE_FACTOR=1 flameshot
exec-once = libinput-gestures-setup start
exec-once = blueman-applet
exec-once = ~/.config/hypr/wallpaper.sh
exec-once = firefox
exec-once = spotify
exec-once = Telegram
exec-once = /home/dfalcon/Downloads/timedoctor-desktop_3.12.16_wayland_linux-x86_64.AppImage --no-sandbox

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = MOZ_ENABLE_WAYLAND,1
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in  = 5
    gaps_out = 20

    border_size = 2

    # Tokyo Night
    col.active_border   = rgba(7aa2f7ee) rgba(bb9af7ee) 45deg
    col.inactive_border = rgba(24283baa)

    resize_on_border = true
    allow_tearing    = false
    layout           = dwindle
}

decoration {
    rounding       = 10
    rounding_power = 2
    active_opacity   = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled      = true
        range        = 4
        render_power = 3
        color        = rgba(1a1b26ee)
    }

    blur {
        enabled   = true
        size      = 3
        passes    = 1
        vibrancy  = 0.1696
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1, 10,   default
    animation = border,        1, 5.39, easeOutQuint
    animation = windows,       1, 4.79, easeOutQuint
    animation = windowsIn,     1, 4.1,  easeOutQuint, popin 87%
    animation = windowsOut,    1, 1.49, linear,       popin 87%
    animation = fadeIn,        1, 1.73, almostLinear
    animation = fadeOut,       1, 1.46, almostLinear
    animation = fade,          1, 3.03, quick
    animation = layers,        1, 3.81, easeOutQuint
    animation = layersIn,      1, 4,    easeOutQuint, fade
    animation = layersOut,     1, 1.5,  linear,       fade
    animation = fadeLayersIn,  1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces,    1, 1.94, almostLinear, fade
    animation = workspacesIn,  1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
    animation = zoomFactor,    1, 7,    quick
}

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    disable_splash_rendering = true

}

#############
### INPUT ###
#############

input {
    kb_layout  = us, ru, ua
    kb_variant = , ,
    kb_options = grp:alt_shift_toggle

    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll = false
        tap-to-click   = true
    }
}

# Жести — нативна підтримка Hyprland
gesture = 3, horizontal, workspace
gesture = 3, up,         fullscreen
gesture = 3, down,       float
gesture = 4, up,         close

###################
### KEYBINDINGS ###
###################

# Термінал і лаунчер
bind = $mainMod,       Return, exec, $terminal
bind = $mainMod,       D,      exec, $menu

# Вікна
bind = $mainMod SHIFT, Q,     killactive
bind = $mainMod,       F,     fullscreen, 0
bind = $mainMod SHIFT, Space, togglefloating
bind = $mainMod,       Space, focusurgentorlast
bind = $mainMod,       A,     layoutmsg, focusmaster
bind = $mainMod,       P,     pseudo

# Split/layout — dwindle togglesplit (= i3 $mod+e layout toggle split)
bind = $mainMod, E, layoutmsg, togglesplit

# Блокування ($mod+Shift+L — як в i3)
bind = $mainMod SHIFT, L, exec, hyprlock

# Фокус — vim-стиль (як в i3: j=left, k=down, l=up, semicolon=right)
bind = $mainMod, J,         movefocus, l
bind = $mainMod, K,         movefocus, d
bind = $mainMod, L,         movefocus, u
bind = $mainMod, semicolon, movefocus, r

# Фокус — стрілки
bind = $mainMod, left,  movefocus, l
bind = $mainMod, down,  movefocus, d
bind = $mainMod, up,    movefocus, u
bind = $mainMod, right, movefocus, r

# Переміщення вікон — vim-стиль
bind = $mainMod SHIFT, J,         movewindow, l
bind = $mainMod SHIFT, K,         movewindow, d
bind = $mainMod SHIFT, L,         movewindow, u
bind = $mainMod SHIFT, semicolon, movewindow, r

# Переміщення вікон — стрілки
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, down,  movewindow, d
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, right, movewindow, r

# Воркспейси
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Переміщення вікна на воркспейс
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpad ($mod+S — замість i3 stacking layout)
bind = $mainMod,       S, togglespecialworkspace
bind = $mainMod SHIFT, S, movetoworkspace,        special

# Скрол через воркспейси колесом миші
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Переміщення/ресайз мишею
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Скріншоти
bind = , Print, exec, QT_AUTO_SCREEN_SCALE_FACTOR=0 QT_SCALE_FACTOR=1 flameshot gui
bind = , F9,    exec, grim -g "$(slurp)" ~/Pictures/$(date +%Y%m%d_%H%M%S).png

# Аудіо
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl  = , XF86AudioNext,        exec, playerctl next
bindl  = , XF86AudioPause,       exec, playerctl play-pause
bindl  = , XF86AudioPlay,        exec, playerctl play-pause
bindl  = , XF86AudioPrev,        exec, playerctl previous

# Яскравість
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Перезавантаження конфігу ($mod+Shift+C і +R, як в i3)
bind = $mainMod SHIFT, C, exec, hyprctl reload
bind = $mainMod SHIFT, R, exec, hyprctl reload

# Вихід ($mod+Shift+E, як в i3)
bind = $mainMod SHIFT, E, exec, hyprctl dispatch exit

# === РЕЖИМ РЕСАЙЗУ ($mod+R) ===
bind = $mainMod, R, submap, resize
submap = resize
# vim-стиль (j=shrink width, k=grow height, l=shrink height, ;=grow width)
binde = , J,         resizeactive, -10 0
binde = , K,         resizeactive, 0 10
binde = , L,         resizeactive, 0 -10
binde = , semicolon, resizeactive, 10 0
# стрілки
binde = , left,  resizeactive, -10 0
binde = , down,  resizeactive, 0 10
binde = , up,    resizeactive, 0 -10
binde = , right, resizeactive, 10 0
bind  = , Return, submap, reset
bind  = , Escape, submap, reset
bind  = $mainMod, R, submap, reset
submap = reset

# Управління дисплеями ($mod+X)
bind = $mainMod, X, exec, nwg-displays

##############################
### WINDOWS AND WORKSPACES ###
##############################

# Прозорість kitty
windowrule {
    name  = kitty-opacity
    match:class = ^(kitty)$
    opacity = 0.9 0.9
}

# Автоприсвоєння воркспейсів (як for_window в i3)
windowrule {
    name = ws-firefox
    match:class = ^(firefox|Firefox)$
    workspace = 1 silent
}
windowrule {
    name = ws-spotify
    match:class = ^(Spotify|spotify)$
    workspace = 9 silent
}
windowrule {
    name = ws-telegram
    match:class = ^(org\.telegram\.desktop|Telegram|TelegramDesktop)$
    workspace = 10 silent
}
windowrule {
    name = ws-timedoctor
    match:class = ^(Time Doctor|timedoctor)$
    workspace = 10 silent
}

# Flameshot
windowrule {
    name = flameshot-float
    match:class = ^(flameshot)$
    float = true
    move  = 0 0
    pin   = true
}

# Подавити maximize requests
windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

# Фікс XWayland drag
windowrule {
    name = fix-xwayland-drags
    match:class      = ^$
    match:title      = ^$
    match:xwayland   = true
    match:float      = true
    match:fullscreen = false
    match:pin        = false
    no_focus = true
}
